{% extends "base.html" %}

{% block content %}

<table width=80% border=1>
    <tr><th>ID</th><th>Name</th><th>E-mail</th><th>Last seen</th><th>About me</th></tr>
    {% for u in users%}
    <tr>
        <td>{{u.id}}</td>
        <td><a href="user/{{u.username}}">{{u.username}}</a></td>
        <td>{{u.role_id}}</td>
        <td>{{u.rolet}}</td>
        <td>{{u.email}}</td>
        <td>{{u.last_seen}}</td>
        <td>{{u.about_me}}</td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
